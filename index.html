<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>忘れ物防止タグ</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4a90d9">
<link rel="icon" href="icon-192.png">
<!-- 地図ライブラリ（Leaflet）と地図データ（OpenStreetMap）は無料・APIキー不要 -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: #f0f4f8;
    color: #333;
    padding: 16px;
    max-width: 480px;
    margin: 0 auto;
    -webkit-tap-highlight-color: transparent;
  }
  h1 { font-size: 20px; text-align: center; margin: 8px 0 16px; }

  /* 大きな状態表示（まる） */
  .big-status {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    margin: 0 auto 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: bold;
    background: #ddd;
    color: #666;
    transition: background 0.3s;
  }
  .big-status .icon { font-size: 48px; margin-bottom: 4px; }
  .big-status.watching { background: #d4edda; color: #155724; box-shadow: 0 0 0 8px #d4edda55; }
  .big-status.lost { background: #f8d7da; color: #721c24; box-shadow: 0 0 0 8px #f8d7da88; animation: blink 0.8s infinite; }
  @keyframes blink { 50% { opacity: 0.6; } }

  .battery { text-align: center; font-size: 14px; color: #666; margin-bottom: 12px; min-height: 20px; }

  .card {
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  }
  button {
    width: 100%;
    padding: 16px;
    font-size: 17px;
    border: none;
    border-radius: 10px;
    background: #4a90d9;
    color: #fff;
    margin-top: 8px;
    cursor: pointer;
  }
  button:first-child { margin-top: 0; }
  button:disabled { background: #bbb; }
  button.green { background: #5cb85c; }
  button.gray { background: #999; }
  label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    padding: 8px 0;
  }
  input[type="checkbox"] { width: 20px; height: 20px; }
  details { margin-top: 8px; }
  summary { font-size: 14px; color: #666; cursor: pointer; }
  #log {
    font-size: 11px;
    font-family: monospace;
    background: #222;
    color: #9f9;
    border-radius: 8px;
    padding: 8px;
    height: 140px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
    margin-top: 8px;
  }
  .footer { text-align: center; margin: 16px 0; }
  .footer a { color: #4a90d9; font-size: 13px; }

  #lastSeenCard { display: none; }
  #lastSeenMap { width: 100%; height: 180px; border-radius: 8px; margin-top: 8px; }
  .last-seen-text { font-size: 14px; color: #555; }
  .last-seen-text .when { font-size: 12px; color: #999; margin-top: 2px; }
</style>
</head>
<body>

<h1>🔑 忘れ物防止タグ</h1>

<div id="bigStatus" class="big-status">
  <div class="icon">💤</div>
  <div id="statusText">未接続</div>
</div>
<div id="battery" class="battery"></div>

<div class="card">
  <button id="btnConnect">📶 タグとつなぐ</button>
  <button id="btnBeep" class="green" disabled>🔔 タグを鳴らして探す</button>
  <button id="btnStop" class="gray" disabled>🔕 音を止める</button>
</div>

<div class="card">
  <label><input type="checkbox" id="chkReconnect" checked> 切れたら自動でつなぎ直す</label>
  <label><input type="checkbox" id="chkAwake"> 画面をつけたままにする（見守り用）</label>
  <button id="btnDisconnect" class="gray" disabled>切断する</button>
</div>

<div class="card" id="lastSeenCard">
  <div class="last-seen-text">📍 最後にタグの近くにいた場所</div>
  <div id="lastSeenMap"></div>
  <div class="last-seen-text"><span id="lastSeenAddress"></span><div class="when" id="lastSeenWhen"></div></div>
  <button id="btnOpenMap" class="gray">🗺️ 地図アプリで開く</button>
</div>

<div class="card">
  <details>
    <summary>📋 くわしい記録（ログ）</summary>
    <div id="log"></div>
  </details>
</div>

<div class="footer"><a href="shindan.html">🔧 診断ページを開く</a></div>

<script>
// ============================================================
// 忘れ物防止タグ 本番アプリ
// このタグの癖（診断で判明）: 鳴らす合図は「1」（標準の「2」は無視される）
// ============================================================

// ===== 画面の部品 =====
const bigStatus  = document.getElementById("bigStatus");
const statusText = document.getElementById("statusText");
const statusIcon = bigStatus.querySelector(".icon");
const batteryEl  = document.getElementById("battery");
const logEl      = document.getElementById("log");
const btnConnect    = document.getElementById("btnConnect");
const btnBeep       = document.getElementById("btnBeep");
const btnStop       = document.getElementById("btnStop");
const btnDisconnect = document.getElementById("btnDisconnect");
const chkReconnect  = document.getElementById("chkReconnect");
const chkAwake      = document.getElementById("chkAwake");
const lastSeenCard    = document.getElementById("lastSeenCard");
const lastSeenAddress = document.getElementById("lastSeenAddress");
const lastSeenWhen    = document.getElementById("lastSeenWhen");
const btnOpenMap      = document.getElementById("btnOpenMap");

// ===== 覚えておく変数 =====
let device = null;              // タグ本体
let alertChar = null;           // 鳴らす合図の書き込み先
let intentionalDisconnect = false;
let reconnectTimer = null;      // 自動再接続の予約
let wakeLock = null;            // 画面つけっぱなし機能
let audioCtx = null;            // スマホで音を出す装置
let alarmPlaying = false;       // 警告音を鳴らしている最中か
let gpsWatchId = null;          // 現在地の追跡ID
let currentPosition = null;     // 直近のGPS位置（見守り中に更新され続ける）
let lastSeenMap = null;         // 「最後にいた場所」の地図（Leaflet）
let lastSeenMarker = null;

function log(msg) {
  const time = new Date().toLocaleTimeString("ja-JP");
  logEl.textContent += `[${time}] ${msg}\n`;
  logEl.scrollTop = logEl.scrollHeight;
}

function setStatus(kind) {
  bigStatus.className = "big-status";
  if (kind === "watching") {
    bigStatus.classList.add("watching");
    statusIcon.textContent = "🛡️";
    statusText.textContent = "見守り中";
  } else if (kind === "lost") {
    bigStatus.classList.add("lost");
    statusIcon.textContent = "⚠️";
    statusText.textContent = "タグが離れた！";
  } else if (kind === "connecting") {
    statusIcon.textContent = "📡";
    statusText.textContent = "接続中…";
  } else {
    statusIcon.textContent = "💤";
    statusText.textContent = "未接続";
  }
}

// ===== スマホ側の音 =====
// ボタンを押した時に音の装置を準備しておく（スマホは操作なしに音を出せない決まりのため）
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === "suspended") audioCtx.resume();
}

// beepOnce: 1回ピッと鳴らす部品
function beepOnce(freq, durationMs, volume) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.frequency.value = freq;
  gain.gain.value = volume;
  osc.start();
  osc.stop(audioCtx.currentTime + durationMs / 1000);
}

// 警告音（置き忘れ・呼び出し）: 止めるまで or 指定回数鳴り続ける
function playAlarm(kind) {
  ensureAudio();
  alarmPlaying = true;
  const freq = (kind === "lost") ? 880 : 660;   // 置き忘れ=高い音、呼び出し=少し低い音
  const maxCount = (kind === "lost") ? 30 : 8;  // 置き忘れは長め(約15秒)
  let count = 0;
  const loop = () => {
    if (!alarmPlaying || count >= maxCount) { alarmPlaying = false; return; }
    beepOnce(freq, 250, 0.4);
    if (navigator.vibrate) navigator.vibrate(300);
    count++;
    setTimeout(loop, 500);
  };
  loop();
}

function stopAlarm() { alarmPlaying = false; }

// ===== 現在地の追跡（「最後にいた場所」用） =====
// タグと見守り中の間だけ、スマホの現在地を裏で追いかけておく。
// タグが離れた瞬間に、この最新の位置を「最後にいた場所」として記録する。
function startGpsWatch() {
  if (!navigator.geolocation || gpsWatchId !== null) return;
  gpsWatchId = navigator.geolocation.watchPosition(
    (pos) => { currentPosition = pos.coords; },
    (err) => { log("📍 現在地が取得できません: " + err.message); },
    { enableHighAccuracy: true, maximumAge: 10000 }
  );
}
function stopGpsWatch() {
  if (gpsWatchId !== null) { navigator.geolocation.clearWatch(gpsWatchId); gpsWatchId = null; }
}

// 座標から住所を逆引き（Nominatim・無料）。失敗しても地図表示は続けられる
async function reverseName(lat, lng) {
  try {
    const data = await fetch("https://nominatim.openstreetmap.org/reverse?format=json&accept-language=ja&zoom=17" +
      "&lat=" + lat + "&lon=" + lng).then(r => r.json());
    if (!data || !data.display_name) return null;
    return data.display_name.split(",").slice(0, 3).map(s => s.trim()).join("　");
  } catch { return null; }
}

// 「最後にいた場所」を保存＆表示する
async function saveLastSeen(coords) {
  const record = {
    lat: coords.latitude,
    lng: coords.longitude,
    time: Date.now()
  };
  localStorage.setItem("wasuremono_last_seen", JSON.stringify(record));
  await showLastSeen(record);
}

async function showLastSeen(record) {
  lastSeenCard.style.display = "block";
  const whenText = new Date(record.time).toLocaleString("ja-JP");
  lastSeenWhen.textContent = whenText + " 時点";
  lastSeenAddress.textContent = "住所を調べています…";

  if (!lastSeenMap) {
    lastSeenMap = L.map("lastSeenMap");
    L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(lastSeenMap);
  }
  lastSeenMap.setView([record.lat, record.lng], 17);
  setTimeout(() => lastSeenMap.invalidateSize(), 100); // 隠れていた地図のサイズ計算をやり直す
  if (lastSeenMarker) lastSeenMap.removeLayer(lastSeenMarker);
  lastSeenMarker = L.marker([record.lat, record.lng]).addTo(lastSeenMap);

  const address = await reverseName(record.lat, record.lng);
  lastSeenAddress.textContent = address || "（住所は取得できませんでした）";

  btnOpenMap.onclick = () => {
    window.open(`https://www.openstreetmap.org/?mlat=${record.lat}&mlon=${record.lng}#map=18/${record.lat}/${record.lng}`, "_blank");
  };
}

// アプリを開いた時、前回の「最後にいた場所」があれば表示しておく
(function loadSavedLastSeen() {
  try {
    const saved = JSON.parse(localStorage.getItem("wasuremono_last_seen"));
    if (saved) showLastSeen(saved);
  } catch (e) { /* 保存データがない・壊れている場合は無視 */ }
})();

// ===== 画面つけっぱなし（Wake Lock） =====
async function updateWakeLock() {
  try {
    if (chkAwake.checked && !wakeLock) {
      wakeLock = await navigator.wakeLock.request("screen");
      wakeLock.addEventListener("release", () => { wakeLock = null; });
      log("💡 画面をつけたままにします");
    } else if (!chkAwake.checked && wakeLock) {
      await wakeLock.release();
      wakeLock = null;
      log("💡 画面つけっぱなしを解除しました");
    }
  } catch (e) {
    log("💡 画面つけっぱなし機能が使えませんでした: " + e.message);
    chkAwake.checked = false;
  }
}
chkAwake.addEventListener("change", updateWakeLock);

// ===== アプリが裏に回った・戻ってきた時の処理 =====
// Androidは電池節約のため、裏に回ったアプリのBluetooth通信を止めてしまうことがある。
// なので「裏に回った時に一度だけ知らせる」「戻ってきたら自動でつなぎ直す」で埋め合わせる。
let hiddenNoticeShown = false;
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") {
    hiddenNoticeShown = false;
    // 一度画面が消えて戻ってきた時に、つけっぱなし設定を復活させる
    if (chkAwake.checked && !wakeLock) updateWakeLock();
    // 裏に回っている間に切れていたら、戻ってきた瞬間につなぎ直しを試す
    if (device && !device.gatt.connected && !reconnectTimer) {
      log("📱 アプリに戻りました。つなぎ直しを試みます…");
      tryReconnect(1);
    }
  } else {
    // 裏に回った瞬間。見守り中なら一度だけ知らせておく（切れて初めて気づくのを防ぐ）
    if (device && device.gatt && device.gatt.connected && !hiddenNoticeShown) {
      hiddenNoticeShown = true;
      log("📱 アプリが裏に回りました。この間は見守りが途切れることがあります（Androidの節電機能のため）");
    }
  }
});

// ===== タグとの接続 =====
btnConnect.addEventListener("click", async () => {
  ensureAudio(); // ここで音の準備もしておく
  if (!navigator.bluetooth) {
    alert("このブラウザはBluetoothに対応していません。\nAndroidのChromeか、PCのEdge/Chromeで開いてください。\n（ホーム画面アイコンやhttps経由で開く必要があります）");
    return;
  }
  try {
    if (!device) {
      log("タグを探しています…");
      device = await navigator.bluetooth.requestDevice({
        acceptAllDevices: true,
        optionalServices: ["immediate_alert", "link_loss", "battery_service", 0xFFE0]
      });
      device.addEventListener("gattserverdisconnected", onDisconnected);
      log(`発見: ${device.name || "(名前なし)"}`);
    }
    await connectAndSetup();
  } catch (e) {
    if (e.name === "NotFoundError") {
      log("タグが選ばれませんでした");
    } else {
      log("❌ 接続エラー: " + e.message);
    }
  }
});

// 接続して、必要な機能を準備する（初回も再接続も共通）
async function connectAndSetup() {
  setStatus("connecting");
  const server = await device.gatt.connect();

  // 鳴らす機能
  try {
    const s = await server.getPrimaryService("immediate_alert");
    alertChar = await s.getCharacteristic("alert_level");
  } catch (e) {
    alertChar = null;
    log("（鳴らす機能が見つかりませんでした）");
  }

  // 電池残量
  try {
    const s = await server.getPrimaryService("battery_service");
    const c = await s.getCharacteristic("battery_level");
    const v = await c.readValue();
    batteryEl.textContent = `🔋 タグの電池: ${v.getUint8(0)}%`;
  } catch (e) { /* 電池機能がないタグもある */ }

  // タグのボタン → スマホを鳴らす
  try {
    const s = await server.getPrimaryService(0xFFE0);
    const chars = await s.getCharacteristics();
    for (const c of chars) {
      if (c.properties.notify) {
        await c.startNotifications();
        c.addEventListener("characteristicvaluechanged", () => {
          log("🔘 タグのボタンが押されました → スマホを鳴らします");
          playAlarm("call");
        });
      }
    }
  } catch (e) { /* ボタン機能がないタグもある */ }

  setStatus("watching");
  btnConnect.disabled = true;
  btnBeep.disabled = !alertChar;
  btnStop.disabled = !alertChar;
  btnDisconnect.disabled = false;
  stopAlarm();
  startGpsWatch();
  log("✅ 接続完了。見守りを始めます");
}

// ===== 接続が切れたとき =====
function onDisconnected() {
  alertChar = null;
  btnBeep.disabled = true;
  btnStop.disabled = true;

  if (intentionalDisconnect) {
    intentionalDisconnect = false;
    setStatus("idle");
    btnConnect.disabled = false;
    btnDisconnect.disabled = true;
    batteryEl.textContent = "";
    stopGpsWatch();
    log("切断しました");
    return;
  }

  // 勝手に切れた ＝ タグが離れた（置き忘れ？）
  setStatus("lost");
  log("⚠️ タグとの接続が切れました！（置き忘れ？）");
  playAlarm("lost");
  if (currentPosition) {
    saveLastSeen(currentPosition);
    log("📍 最後にいた場所を記録しました");
  } else {
    log("📍 現在地が取れていなかったため、場所は記録できませんでした");
  }

  if (chkReconnect.checked) {
    log("🔄 自動でつなぎ直しを試みます…");
    tryReconnect(1);
  } else {
    btnConnect.disabled = false;
    btnDisconnect.disabled = true;
    stopGpsWatch();
  }
}

// 自動再接続: 5秒おきに試す（タグが近くに戻れば自動復帰する）
function tryReconnect(attempt) {
  if (!device || device.gatt.connected || !chkReconnect.checked) return;
  reconnectTimer = setTimeout(async () => {
    try {
      log(`🔄 つなぎ直し ${attempt}回目…`);
      await connectAndSetup();
      log("✅ 復帰しました！");
      beepOnce(1320, 150, 0.3); // 復帰のお知らせ音（短くピッ）
    } catch (e) {
      tryReconnect(attempt + 1);
    }
  }, 5000);
}

// ===== ボタン類 =====
btnDisconnect.addEventListener("click", () => {
  if (reconnectTimer) clearTimeout(reconnectTimer);
  if (device && device.gatt.connected) {
    intentionalDisconnect = true;
    device.gatt.disconnect();
  }
});

// このタグは「1」で鳴る（診断で確認済み）
async function writeAlert(value) {
  if (!alertChar) return;
  try {
    await alertChar.writeValueWithoutResponse(new Uint8Array([value]));
  } catch (e) {
    await alertChar.writeValue(new Uint8Array([value]));
  }
}

btnBeep.addEventListener("click", async () => {
  ensureAudio();
  try {
    await writeAlert(1);
    log("🔔 タグを鳴らしています");
  } catch (e) {
    log("❌ 鳴らせませんでした: " + e.message);
  }
});

btnStop.addEventListener("click", async () => {
  stopAlarm();
  try {
    await writeAlert(0);
    log("🔕 音を止めました");
  } catch (e) { /* 既に止まっている場合など */ }
});

// ===== PWA（ホーム画面アプリ化）の登録 =====
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}
</script>
</body>
</html>
